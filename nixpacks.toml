# nixpacks.toml — Railway build configuration
# Place this file at the project root (/heatloss/nixpacks.toml).
#
# Railway uses Nixpacks to detect and build services. Without this file it
# would pick either Node or Python but not both. We declare both explicitly
# so the PDF generators (ReportLab/Python) and Express (Node) work together.

[phases.setup]
nixPkgs = ["nodejs_20", "python312", "pip"]

[phases.install]
cmds = [
  # Install server (Express) dependencies
  "cd server && npm install",
  # Install client (Vite/React) dependencies and build the frontend
  "cd client && npm install && npm run build",
]

[start]
cmd = "cd server && node server.js"
