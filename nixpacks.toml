# nixpacks.toml — Railway build configuration
# Place this file at the project root (/heatloss/nixpacks.toml).
#
# Node and Python declared explicitly so both runtimes are available.
# ReportLab is installed via requirements.txt in the server folder,
# which Nixpacks picks up automatically during the install phase.

[phases.setup]
nixPkgs = ["nodejs_20", "python312"]

[phases.install]
cmds = [
  "cd server && npm install",
  "cd client && npm install && npm run build",
  "pip install -r server/requirements.txt",
]

[start]
cmd = "cd server && node server.js"
